version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: contract-postgres
    restart: always
    environment:
      POSTGRES_DB: contractdb
      POSTGRES_USER: contractuser
      POSTGRES_PASSWORD: contractpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: