<section class="page">
  <div class="card">
    <h2>Aditar contrato</h2>
    <p class="subtitle">Informe o número do contrato e os novos dados para alteração.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="field">
        <label for="contractNumber">Número do contrato</label>
        <input id="contractNumber" type="text" formControlName="contractNumber" />
        <small class="error" *ngIf="hasError('contractNumber')">Campo obrigatório.</small>
      </div>

      <div class="field">
        <label for="enterpriseName">Nome da empresa</label>
        <input id="enterpriseName" type="text" formControlName="enterpriseName" />
        <small class="error" *ngIf="hasError('enterpriseName')">Campo obrigatório.</small>
      </div>

      <div class="field">
        <label for="legalName">Razão social</label>
        <input id="legalName" type="text" formControlName="legalName" />
        <small class="error" *ngIf="hasError('legalName')">Campo obrigatório.</small>
      </div>

      <div class="field">
        <label for="enterpriseAdress">Endereço</label>
        <input id="enterpriseAdress" type="text" formControlName="enterpriseAdress" />
        <small class="error" *ngIf="hasError('enterpriseAdress')">Campo obrigatório.</small>
      </div>

      <div class="field">
        <label for="nameCEO">CEO</label>
        <input id="nameCEO" type="text" formControlName="nameCEO" />
        <small class="error" *ngIf="hasError('nameCEO')">Campo obrigatório.</small>
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Salvando...' : 'Salvar alterações' }}
      </button>
    </form>

    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</section>
