server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/contractdb
    username: contractuser
    password: contractpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  pattern:
    dateformat: dd/MM/yyyy HH:mm:ss

springdoc:
  swagger-ui:
    path: /swagger-ui.html